<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple News Story Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div id="header-left">
    <h1><a href="index.html">Apple News Story Explorer</a></h1>
    <p>Browse and filter collected Apple News stories</p>
  </div>
  <div id="total-count"></div>
</header>

<main>
  <div id="tabs">
    <button class="tab-btn active" data-tab="data-table">Data Table</button>
    <button class="tab-btn" data-tab="visuals">Visuals</button>
    <button class="tab-btn" data-tab="coverage">Coverage</button>
  </div>

  <div id="data-table" class="tab-panel active">
    <div id="controls">
      <label>Section
        <select id="filter-section">
          <option value="">All</option>
          <option value="top">Top</option>
          <option value="trending">Trending</option>
          <option value="reader_favorites">Reader Favorites</option>
        </select>
      </label>
      <label>Publication <select id="filter-pub"><option value="">All</option></select></label>
      <label>Search <input type="text" id="search" placeholder="headline, publication…" /></label>
      <div class="controls-break"></div>
      <label><input type="checkbox" id="filter-edited" /> Edited headlines only</label>
      <label><input type="checkbox" id="filter-has-link" /> Has link only</label>
      <div id="date-popup-anchor">
        <button id="date-range-btn">Date Range</button>
        <div id="date-panel">
          <div id="histogram"></div>
          <div id="date-track-wrap">
            <div id="date-track">
              <div id="date-fill"></div>
            </div>
            <div class="slider-handle" id="handle-min"></div>
            <div class="slider-handle" id="handle-max"></div>
          </div>
          <div id="date-labels">
            <span id="label-min"></span>
            <span id="label-max"></span>
          </div>
          <div id="date-panel-footer">
            <button id="date-reset" class="reset-btn">Reset to full range</button>
          </div>
        </div>
      </div>
      <button id="clear-filters-btn" style="display:none">Clear filters</button>
      <span id="result-count"></span>
    </div>

    <div id="table-wrap">
      <div id="message">Loading data…</div>
      <table id="story-table" style="display:none">
        <thead><tr>
          <th data-col="section">Section</th>
          <th data-col="headline">Headline</th>
          <th data-col="publication">Publication</th>
          <th data-col="first_seen">Initial Observation</th>
          <th data-col="last_seen">Most Recent Observation</th>
        </tr></thead>
        <tbody id="story-body"></tbody>
      </table>
    </div>
  </div>

  <div id="visuals" class="tab-panel">

    <div id="chart-paper-table"></div>
    <div id="chart-top-sources"></div>
    <div id="chart-trending-sources"></div>
    <div id="chart-comparison"></div>
    <div id="chart-top-hour"></div>
    <div id="chart-trending-hour"></div>
  </div>

  <div id="coverage" class="tab-panel"></div>
</main>

<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">&times;</button>
    <h2 id="modal-headline"></h2>
    <div class="modal-pub" id="modal-pub"></div>
    <div class="modal-byline" id="modal-byline" style="display:none"></div>
    <div id="modal-headlines" style="display:none">
      <p class="modal-headline-row"><span class="modal-headline-label">Apple News headline:</span> <span id="modal-display-headline"></span></p>
      <p class="modal-headline-row"><span class="modal-headline-label">Article headline:</span> <span id="modal-article-headline"></span></p>
    </div>
    <a id="modal-link" class="modal-link" target="_blank" rel="noopener">Open in Apple News &#8594;</a>
    <table>
      <thead><tr><th>Observed At</th><th>Section</th><th>Rank</th></tr></thead>
      <tbody id="modal-body"></tbody>
    </table>
  </div>
</div>

</body>
